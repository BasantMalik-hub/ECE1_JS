<!DOCTYPE html>
<html>
<head>
<title>Student Result Calculator</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    text-align:center;
}

.container{
    width:400px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

input,button{
    padding:8px;
    margin:5px;
}

#result{
    margin-top:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>Result Calculator</h2>

<label>Enter Number of Subjects</label><br>
<input type="number" id="subjects"><br>

<button onclick="calculate()">Enter Marks</button>

<div id="result"></div>

</div>

<script>

function calculate(){

    let subjects = document.getElementById("subjects").value;

    let total = 0;

    for(let i=1; i<=subjects; i++){

        let marks = parseInt(prompt("Enter marks for Subject " + i));

        total = total + marks;
    }

    let average = total / subjects;

    let grade;

    if(average >= 90){
        grade = "A+";
    }
    else if(average >= 75){
        grade = "A";
    }
    else if(average >= 60){
        grade = "B";
    }
    else if(average >= 40){
        grade = "C";
    }
    else{
        grade = "Fail";
    }

    let result = (average >= 40) ? "Pass" : "Fail";

    document.getElementById("result").innerHTML =
        "Total Marks: " + total + "<br>" +
        "Average Marks: " + average.toFixed(2) + "<br>" +
        "Grade: " + grade + "<br>" +
        "Result: " + result;
}

</script>

</body>
</html>
